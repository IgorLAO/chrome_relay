<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrome</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #1a1a1a; overflow: hidden; font-family: Arial, sans-serif; }

#bar {
  height: 44px;
  background: #2d2d2d;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 8px;
  border-bottom: 1px solid #444;
  user-select: none;
}

#bar button {
  background: none;
  border: none;
  color: #ccc;
  font-size: 18px;
  cursor: pointer;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#bar button:hover { background: #444; }
#bar button:disabled { color: #555; cursor: default; }
#bar button:disabled:hover { background: none; }

#url-wrap { flex: 1; position: relative; }
#url-input {
  width: 100%;
  padding: 6px 12px;
  border-radius: 20px;
  border: none;
  background: #444;
  color: #fff;
  font-size: 14px;
  outline: none;
}
#url-input:focus { background: #555; }

#ping {
  color: #666;
  font-size: 11px;
  padding: 0 6px;
  min-width: 52px;
  text-align: right;
  flex-shrink: 0;
}

#viewport {
  position: relative;
  width: 100%;
  height: calc(100% - 44px);
  overflow: hidden;
}

#screen {
  display: block;
  width: 100%;
  height: 100%;
  cursor: default;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}

#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: #1a1a1a;
  color: #aaa;
  font-size: 16px;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #444;
  border-top-color: #888;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="bar">
  <button id="btn-back"   title="Back">&#8592;</button>
  <button id="btn-fwd"    title="Forward">&#8594;</button>
  <button id="btn-reload" title="Reload">&#8635;</button>
  <div id="url-wrap">
    <input id="url-input" type="text" placeholder="Enter URL or search…" spellcheck="false" autocomplete="off">
  </div>
  <span id="ping">–</span>
</div>

<div id="viewport">
  <canvas id="screen"></canvas>
  <div id="overlay">
    <div class="spinner"></div>
    <span id="overlay-msg">Connecting…</span>
  </div>
</div>

<script src="client.js"></script>
</body>
</html>
