services:
  chrome:
    image: zenika/alpine-chrome:latest
    platform: linux/amd64
    # Image's ENTRYPOINT already includes --headless --no-sandbox
    # --disable-dev-shm-usage. We append the debugging + anti-throttling flags.
    command:
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --remote-allow-origins=*
      - --disable-background-timer-throttling
      - --disable-backgrounding-occluded-windows
      - --disable-renderer-backgrounding
    networks:
      - proxy
    restart: unless-stopped

  relay:
    build: .
    platform: linux/amd64
    depends_on:
      - chrome
    environment:
      CHROME_URL: http://chrome:9222
      HTTP_PORT: "3050"
      HTTPS_PORT: "3051"
      DEFAULT_URL: ${DEFAULT_URL:-https://pwisistemas1.digisac.chat/}
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Router HTTPS — defina RELAY_HOST no .env (ex.: relay.seudominio.com)
      - "traefik.http.routers.relay.rule=Host(`${RELAY_HOST}`)"
      - "traefik.http.routers.relay.entrypoints=websecure"
      - "traefik.http.routers.relay.tls=true"
      - "traefik.http.routers.relay.tls.certresolver=myresolver"
      - "traefik.http.routers.relay.middlewares=relay-auth"
      # Backend HTTP (Traefik termina TLS na borda; WebSocket passa transparente)
      - "traefik.http.services.relay.loadbalancer.server.port=3050"
      # Basic auth — usuário: admin / senha: CarlinhosCode (bcrypt, $ escapado como $$)
      - "traefik.http.middlewares.relay-auth.basicauth.users=admin:$$2y$$05$$mEmylh9niueWgeQUwCnuROH8SJJVYWn/Mskg3fJGX83YUhtkzEMFO"

networks:
  proxy:
    external: true
